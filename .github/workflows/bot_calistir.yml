name: Finans Botu Calistir

on:
  schedule:
    - cron: '*/5 * * * *'  # 5 dakikada bir çalış
  workflow_dispatch:       # Elle tetikleme butonu

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Çek
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Kütüphaneleri Yükle
        run: |
          pip install gspread oauth2client requests beautifulsoup4 yfinance

      - name: Kimlik Dosyasını Oluştur
        env:
          GCP_CREDS: ${{ secrets.GCP_CREDS }}
        run: |
          python -c "import os; open('credentials.json', 'w').write(os.environ['GCP_CREDS'])"

      - name: Botu Çalıştır
        run: python bot.py
